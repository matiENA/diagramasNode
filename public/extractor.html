<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extractor Maestro de Personal - EOR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; }
    .easy-click:active { transform: scale(0.97); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 sm:p-8">

  <div class="max-w-5xl mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-700 pb-6 mb-6 gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-black text-indigo-400 tracking-tight">Recopilación Maestra de Personal</h1>
        <p class="text-sm text-slate-400 mt-1">Base unificada de identidades cruzada de todas las planillas</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button onclick="copiarEnMasa()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-xl text-xs font-bold uppercase tracking-wider transition-all shadow-md flex items-center gap-2">
          📋 Copiar en Masa
        </button>
        <button onclick="exportarACSV()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-xl text-xs font-bold uppercase tracking-wider transition-all shadow-md flex items-center gap-2">
          📊 Exportar a Excel / Sheet
        </button>
      </div>
    </div>

    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
      <input type="text" id="buscar" oninput="filtrar()" placeholder="Filtrar por nombre o DNI..." class="w-full sm:w-80 bg-slate-950 border border-slate-600 text-slate-100 text-sm rounded-lg p-2.5 outline-none focus:border-indigo-500 transition-all font-bold">
      <span class="text-xs font-black text-slate-400 uppercase tracking-widest bg-slate-950 px-3 py-2 rounded-lg border border-slate-700">
        Padrón Consolidado: <span id="contador" class="text-indigo-400">0</span> Choferes
      </span>
    </div>

    <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-950 text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-700">
              <th class="p-4">Apellido y Nombre (Easy Click)</th>
              <th class="p-4 w-48 text-center">DNI (Easy Click)</th>
            </tr>
          </thead>
          <tbody id="tabla-cuerpo" class="divide-y divide-slate-700/60 font-medium text-xs">
            <tr>
              <td colspan="2" class="p-8 text-center text-slate-400 animate-pulse font-bold">Cargando y unificando registros desde los servidores...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let choferesBase = [];

    // Cargar la información limpia procesada por el Servidor Node
    document.addEventListener("DOMContentLoaded", () => {
        fetch('/api/maestro-choferes')
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                choferesBase = data.choferes;
                inyectarTabla(choferesBase);
            } else {
                document.getElementById("tabla-cuerpo").innerHTML = `<tr><td colspan="2" class="p-8 text-center text-red-400 font-bold">Error: ${data.error}</td></tr>`;
            }
        })
        .catch(err => {
            document.getElementById("tabla-cuerpo").innerHTML = `<tr><td colspan="2" class="p-8 text-center text-red-400 font-bold">Error de red conectando al motor híbrido.</td></tr>`;
        });
    });

    function inyectarTabla(lista) {
        const cuerpo = document.getElementById("tabla-cuerpo");
        document.getElementById("contador").innerText = lista.length;
        
        if(lista.length === 0) {
            cuerpo.innerHTML = `<tr><td colspan="2" class="p-8 text-center text-slate-500 font-bold uppercase">Sin registros coincidentes</td></tr>`;
            return;
        }

        cuerpo.innerHTML = lista.map(c => `
            <tr class="hover:bg-slate-700/30 transition-colors">
                <td class="p-3">
                    <button onclick="easyClick('${c.nom.replace(/'/g, "\\'")}')" class="easy-click text-left w-full px-3 py-2 bg-slate-900/40 hover:bg-indigo-950/40 hover:text-indigo-300 border border-slate-700/60 rounded-xl transition-all font-bold tracking-wide flex items-center justify-between group">
                        <span>${c.nom}</span>
                        <span class="text-[9px] text-slate-500 group-hover:text-indigo-400 opacity-0 group-hover:opacity-100 uppercase tracking-widest font-black transition-opacity">Copiar</span>
                    </button>
                </td>
                <td class="p-3">
                    <button onclick="easyClick('${c.dni}')" class="easy-click text-center w-full px-3 py-2 bg-slate-900/40 hover:bg-emerald-950/40 hover:text-emerald-300 border border-slate-700/60 rounded-xl transition-all font-mono font-bold tracking-widest flex items-center justify-center gap-2 group">
                        <span>${c.dni}</span>
                        <span class="text-[8px] text-slate-500 group-hover:text-emerald-400 opacity-0 group-hover:opacity-100 uppercase font-black transition-opacity">📋</span>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Easy Click: Copiado instantáneo al portapapeles celda por celda
    function easyClick(texto) {
        if (!texto || texto === "Sin DNI") return;
        navigator.clipboard.writeText(texto).then(() => {
            // Creamos un toast efímero flotante
            const t = document.createElement('div');
            t.className = "fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-950 border border-indigo-500/40 px-4 py-2 rounded-xl text-xs text-indigo-300 font-bold shadow-2xl transition-all duration-300 opacity-0 scale-90";
            t.innerText = `⚡ Copiado: ${texto}`;
            document.body.appendChild(t);
            requestAnimationFrame(() => { t.classList.remove('opacity-0', 'scale-90'); });
            setTimeout(() => { t.classList.add('opacity-0', 'scale-90'); setTimeout(() => t.remove(), 300); }, 1500);
        });
    }

    // Filtrado interactivo por buscador
    function filtrar() {
        const val = document.getElementById("buscar").value.toLowerCase().trim();
        const valNorm = val.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        
        const filtrados = choferesBase.filter(c => {
            let nomNorm = c.nom.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return nomNorm.includes(valNorm) || String(c.dni).includes(val);
        });
        inyectarTabla(filtrados);
    }

    // Copiar en masa formateado listo para pegar en columnas de Sheets
    function copiarEnMasa() {
        if(choferesBase.length === 0) return;
        let strMasa = choferesBase.map(c => `${c.nom}\t${c.dni}`).join('\n');
        navigator.clipboard.writeText(strMasa).then(() => {
            alert(`✅ ${choferesBase.length} registros copiados en masa.\nYa puedes pegarlos directamente en una hoja de cálculo.`);
        });
    }

    // Exportación atómica a archivo CSV compatible nativamente con Sheets/Excel
    function exportarACSV() {
        if(choferesBase.length === 0) return;
        let csvContent = "\uFEFF"; // BOM para asegurar codificación UTF-8 en Excel
        csvContent += "Nombre y Apellido;DNI\n";
        choferesBase.forEach(c => {
            csvContent += `"${c.nom}";"${c.dni}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `maestro_personal_eor_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
  </script>
</body>
</html>
